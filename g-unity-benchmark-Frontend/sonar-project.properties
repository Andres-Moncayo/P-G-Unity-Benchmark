# SonarQube / SonarCloud — frontend (React + Vite)
# Uso: desde esta carpeta, con SONAR_TOKEN exportado:
#   sonar-scanner -Dsonar.host.url=https://sonarcloud.io -Dsonar.organization=TU_ORG -Dsonar.projectKey=g-unity-benchmark-frontend

sonar.projectKey=g-unity-benchmark-frontend
