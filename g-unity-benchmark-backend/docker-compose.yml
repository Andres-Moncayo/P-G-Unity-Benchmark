services:
  postgres:
    image: postgres:16-alpine
    container_name: unity_nexus_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-unity}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-unity_dev_pwd}
      POSTGRES_DB: ${POSTGRES_DB:-unity_nexus}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - unity_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-unity} -d ${POSTGRES_DB:-unity_nexus}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  unity_pgdata:
