# SonarQube / SonarCloud — backend (FastAPI)
# Uso: desde esta carpeta, con SONAR_TOKEN exportado:
#   sonar-scanner -Dsonar.host.url=https://sonarcloud.io -Dsonar.organization=TU_ORG -Dsonar.projectKey=g-unity-benchmark-backend

sonar.projectKey=g-unity-benchmark-backend
sonar.projectName=G-Unity Benchmark Backend
sonar.projectVersion=1.0

sonar.sources=app,core,main.py
sonar.tests=tests
sonar.sourceEncoding=UTF-8
sonar.python.version=3.12

# Excluir entorno virtual, migraciones generadas, informes
sonar.exclusions=**/venv/**,**/.venv/**,**/alembic/versions/**,**/reports/**,**/tools/**

# Cobertura (opcional, si generas coverage.xml con pytest-cov)
# sonar.python.coverage.reportPaths=coverage.xml
